<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>分享请假信息</title>
<meta property="og:title" content="分享请假信息">
<meta property="og:description" content="点击查看请假详情">
<meta property="og:image" content="https://redbannersoverfuji.github.io/leave/icon.png">
<meta property="og:url" content="https://redbannersoverfuji.github.io/leave/card.html">
<meta property="og:image:width" content="200">
<meta property="og:image:height" content="200">
<meta property="og:type" content="website">
<meta property="og:site_name" content="今日校园">
<meta name="twitter:card" content="summary_large_image">
<meta name="description" content="点击查看请假详情">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:#f5f5f5;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Microsoft Yahei",sans-serif;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;padding:4vw;
}

.card{
  display:flex;flex-wrap:wrap;align-items:flex-start;
  background:#fff;border-radius:4vw;padding:5.33333vw;
  width:100%;max-width:580px;
  cursor:pointer;text-decoration:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 0.53333vw 2.66667vw rgba(0,0,0,0.04);
  transition:box-shadow 0.15s;
}
.card:active{box-shadow:0 1.06667vw 4vw rgba(0,0,0,0.08)}

/* 上半部分 */
.top-row{
  display:flex;align-items:flex-start;justify-content:space-between;
  width:100%;
}

/* 左侧文字 */
.left{display:flex;flex-direction:column;flex:1;padding-top:1.06667vw}

.title{
  font-size:5.86667vw;font-weight:800;color:#000;
  letter-spacing:0.26667vw;line-height:1.2;margin-bottom:2.13333vw;
}

.subtitle{
  font-size:3.73333vw;color:#888;letter-spacing:0.26667vw;line-height:1.2;
}

/* 右侧蓝色大方块 */
.right{flex-shrink:0;margin-left:4vw}

.big-box{
  width:22.4vw;height:22.4vw;background:#3678eb;border-radius:3.73333vw;
  display:flex;justify-content:center;align-items:center;gap:1.06667vw;
}

/* 双列竖排文字容器：vertical-lr = 字从上到下，列从左到右 */
.vcol{
  display:flex;writing-mode:vertical-lr;
  color:#fff;font-size:5.33333vw;font-weight:800;
  letter-spacing:1.06667vw;line-height:1;user-select:none;
}

/* 底部 */
.bottom-row{
  display:flex;align-items:center;width:100%;margin-top:5.33333vw;
}

/* 紫色小方块 */
.small-box{
  width:10.13333vw;height:10.13333vw;background:#6048e8;border-radius:2.13333vw;
  display:flex;justify-content:center;align-items:center;gap:0.53333vw;
  flex-shrink:0;
}

.small-box .vcol{
  font-size:3.2vw;font-weight:700;letter-spacing:0.53333vw;
}

.app-label{
  font-size:3.2vw;color:#888;margin-left:2.13333vw;letter-spacing:0.13333vw;
}
</style>
</head>
<body>

<a class="card" href="https://redbannersoverfuji.github.io/leave">

  <div class="top-row">
    <div class="left">
      <div class="title">分享请假信息</div>
      <div class="subtitle">分享请假信息</div>
    </div>
    <div class="right">
      <div class="big-box">
        <div class="vcol">今校</div>
        <div class="vcol">日园</div>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="small-box">
      <div class="vcol">今校</div>
      <div class="vcol">日园</div>
    </div>
    <span class="app-label">今日校园app</span>
  </div>

</a>

</body>
</html>
